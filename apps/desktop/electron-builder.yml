appId: com.code-review.desktop
productName: Code Review
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
  artifactName: ${productName}-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
