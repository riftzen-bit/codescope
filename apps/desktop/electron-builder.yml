appId: com.code-review.desktop
productName: Code Review
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: resources/icon-256.png
    to: icon-256.png

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
  artifactName: ${productName}-${version}.${ext}
  category: Development

publish:
  provider: github

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
