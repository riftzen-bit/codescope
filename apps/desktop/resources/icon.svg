<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E7FF" />
      <stop offset="100%" stop-color="#C7D2FE" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" />

  <!-- Left bracket { -->
  <text x="200" y="580" font-family="monospace" font-size="420" font-weight="700" fill="#E0E7FF" opacity="0.9">{</text>

  <!-- Right bracket } -->
  <text x="560" y="580" font-family="monospace" font-size="420" font-weight="700" fill="#E0E7FF" opacity="0.9">}</text>

  <!-- Magnifying glass circle -->
  <circle cx="640" cy="340" r="140" fill="none" stroke="#FFFFFF" stroke-width="40" opacity="0.95" />

  <!-- Magnifying glass handle -->
  <line x1="740" y1="440" x2="850" y2="550" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" opacity="0.95" />

  <!-- Checkmark inside magnifying glass -->
  <polyline points="570,340 620,390 710,280" fill="none" stroke="#34D399" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
</svg>
