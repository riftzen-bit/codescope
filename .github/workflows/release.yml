name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @code-review/core build

      - name: Type check
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Build desktop app
        run: pnpm --filter @code-review/desktop build

      - name: Package and publish desktop app
        run: pnpm --filter @code-review/desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release notes and publish
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES" ]; then
            gh release edit "$GITHUB_REF_NAME" --notes-file "$NOTES" --draft=false
          else
            gh release edit "$GITHUB_REF_NAME" --draft=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
